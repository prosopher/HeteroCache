name: CPU smoke test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'torch>=2.2,<3' pytest tqdm

      - name: Run CPU smoke tests
        env:
          OMP_NUM_THREADS: '1'
          MKL_NUM_THREADS: '1'
        run: |
          pytest -q tests/test_cli_smoke.py
